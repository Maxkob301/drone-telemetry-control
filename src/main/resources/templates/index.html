<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Drone Control Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 500px; border-radius: 8px; }
        .telemetry-panel { background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .btn-drone { min-width: 120px; }
    </style>
</head>
<body>
<div class="container mt-4">
    <h1 class="mb-3">🛩️ Drone Control</h1>

    <div class="row">
        <!-- Карта -->
        <div class="col-md-8">
            <div id="map"></div>
        </div>

        <!-- Панель телеметрии -->
        <div class="col-md-4">
            <div class="telemetry-panel">
                <h5>📡 Телеметрия</h5>
                <p><strong>Широта:</strong> <span id="lat">—</span></p>
                <p><strong>Долгота:</strong> <span id="lon">—</span></p>
                <p><strong>Высота:</strong> <span id="alt">—</span> м</p>
                <p><strong>Отн. высота:</strong> <span id="relAlt">—</span> м</p>
            </div>

            <!-- Кнопки управления -->
            <div class="mt-3 d-grid gap-2">
                <button class="btn btn-success btn-drone" id="takeoffBtn">🛫 Взлёт</button>
                <button class="btn btn-danger btn-drone" id="landBtn">🛬 Посадка</button>
            </div>

            <div class="mt-3">
                <a href="/history" class="btn btn-outline-primary w-100">📜 История полётов</a>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    // --- Карта ---
    const map = L.map('map').setView([47.397742, 8.545594], 15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    const marker = L.marker([47.397742, 8.545594]).addTo(map);

    // --- WebSocket ---
    const ws = new WebSocket('ws://localhost:8080/telemetry');
    ws.onmessage = function(event) {
        const data = JSON.parse(event.data);
        document.getElementById('lat').textContent = data.latitude.toFixed(6);
        document.getElementById('lon').textContent = data.longitude.toFixed(6);
        document.getElementById('alt').textContent = data.altitude.toFixed(1);
        document.getElementById('relAlt').textContent = data.relativeAltitude.toFixed(1);

        marker.setLatLng([data.latitude, data.longitude]);
        map.setView([data.latitude, data.longitude], 15);
    };

    // --- Отправка команд ---
    function sendCommand(url, successMsg) {
        fetch(url, { method: 'POST' })
            .then(response => response.text())
            .then(data => alert('✅ ' + data))
            .catch(err => alert('❌ Ошибка: ' + err));
    }

    document.getElementById('takeoffBtn').onclick = function() {
        sendCommand('/api/drone/takeoff', 'Взлёт!');
    };

    document.getElementById('landBtn').onclick = function() {
        sendCommand('/api/drone/land', 'Посадка!');
    };
</script>
</body>
</html>
